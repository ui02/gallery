backend:
  name: github
  repo: ui02/gallery  # ← あなたのリポジトリに合わせて
  branch: main
  auth_type: oauth
  app_id: Ov23lijKQ4hLyBlHIe1f
  api_root: https://api.github.com
  base_url: https://ui02.github.io/gallery
  auth_endpoint: /api/auth

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "記事"
    folder: "content/post"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "本文", name: "body", widget: "markdown" }
      - { label: "画像", name: "image", widget: "image" }
