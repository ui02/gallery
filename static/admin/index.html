<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      // invite_token を /admin/ にリダイレクト
      if (window.location.hash.startsWith('#invite_token=')) {
        window.location.href = '/admin/' + window.location.hash;
      }

      // Decap CMS を手動で初期化
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>

<script>
  CMS.init({
    config: "/admin/config.yml",
    site_id: "gallery02"  // ← ここをNetlifyのSite Nameにあわせて明示的に
  });
</script>
  </body>
</html>
